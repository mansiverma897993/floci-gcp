quarkus:
  log:
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] %s%e%n"
      async:
        enabled: true
        overflow: block
        queue-length: 512

  http:
    port: ${floci-gcp.port}
    host: 0.0.0.0
    http2: true
    limits:
      max-body-size: ${floci-gcp.max-request-size}M

  grpc:
    server:
      use-separate-server: false

  shutdown:
    delay-enabled: true

  native:
    additional-build-args:
      - --report-unsupported-elements-at-runtime
      - --allow-incomplete-classpath
      - --enable-url-protocols=http,https
      - --initialize-at-run-time=com.github.dockerjava.transport.NamedPipeSocket$Kernel32
      - --initialize-at-run-time=io.floci.gcp.services.cloudkms.KmsCrypto
      - --initialize-at-run-time=io.floci.gcp.services.cloudsql.CloudSqlPostgresDataPlane
      - --initialize-at-run-time=io.floci.gcp.services.scheduler.SchedulerExpressionParser

floci-gcp:
  port: 4588
  max-request-size: 512
  base-url: "http://localhost:4588"
  default-project-id: floci-local
  storage:
    mode: memory
    persistent-path: ./data
    host-persistent-path: ./data
    prune-volumes-on-delete: false
    wal:
      compaction-interval-ms: 30000
  services:
    gcs:
      enabled: true
    pubsub:
      enabled: true
    firestore:
      enabled: true
    datastore:
      enabled: true
    iam:
      enabled: true
    secretmanager:
      enabled: true
    logging:
      enabled: true
    kms:
      enabled: true
    kafka:
      enabled: true
      mock: false
      default-image: "redpandadata/redpanda:latest"
    cloudsql:
      enabled: true
      mock: false
      postgres15-image: "postgres:15.18-alpine"
      postgres16-image: "postgres:16.14-alpine"
      postgres17-image: "postgres:17.10-alpine"
      postgres18-image: "postgres:18.4-alpine"
      startup-timeout-seconds: 90
    cloudtasks:
      enabled: true
    cloudrun:
      enabled: true
      mock: false
      execution:
        default-port: 8080
        startup-timeout: 240s
        request-timeout: 300s
        operation-timeout: 300s
        cleanup-timeout: 15s
        container-name-prefix: floci-cloudrun
        url-host-suffix:
    cloudfunctions:
      enabled: true
    monitoring:
      enabled: true
    scheduler:
      enabled: true
      invocation-enabled: true
      tick-interval-seconds: 10
    gke:
      enabled: true
      mock: false
      default-image: "rancher/k3s:latest"
      api-server-base-port: 6550
      api-server-max-port: 6599
      keep-running-on-shutdown: false
      endpoint-mode: host
      docker-network:
  dns:
    extra-suffixes:
  docker:
    log-max-size: "10m"
    log-max-file: "3"
    docker-host: "unix:///var/run/docker.sock"
    api-timeout: 30s
  init-hooks:
    shell-executable: /bin/sh
    shutdown-grace-period-seconds: 2
    timeout-seconds: 30
